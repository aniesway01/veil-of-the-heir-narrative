<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>繼承者的面紗 — 互動敘事地圖</title>
<style>
:root {
  --bg: #0a0810;
  --bg2: #120e18;
  --bg3: #1c1628;
  --text: #e6e0f0;
  --text2: #9088a8;
  --text3: #5e5478;
  --accent: #a855f7;
  --accent2: #7c3aed;
  --accent-glow: rgba(168,85,247,0.15);
  --accent2-glow: rgba(124,58,237,0.15);
  --border: #2e2640;
  --card: #140f20;
  --card-hover: #1e1830;
  --warm: #d97706;
  --tag-cond: #a78bfa;
  --tag-default: rgba(255,255,255,0.06);
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  height: 100vh;
  overflow: hidden;
}
.app { display: flex; height: 100vh; flex-direction: column; }

/* === Game Banner === */
.game-banner {
  background: linear-gradient(135deg, #1a0830 0%, #120820 40%, #0a0614 100%);
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.game-banner::before {
  content: '';
  position: absolute;
  top: -50%; right: 0%;
  width: 380px; height: 380px;
  background: radial-gradient(circle, rgba(168,85,247,0.1), transparent 60%);
  pointer-events: none;
  animation: veil-glow 7s ease-in-out infinite;
}
.game-banner::after {
  content: '';
  position: absolute;
  bottom: -40%; left: 15%;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(217,119,6,0.06), transparent 60%);
  pointer-events: none;
  animation: veil-glow 9s ease-in-out infinite reverse;
}
@keyframes veil-glow {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.08); }
}
.banner-top { display: flex; align-items: center; gap: 16px; position: relative; z-index: 1; }
.banner-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--accent), var(--warm));
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  box-shadow: 0 4px 20px rgba(168,85,247,0.35);
}
.banner-text h1 {
  font-size: 24px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.5px;
}
.banner-text .subtitle {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  margin-top: 2px;
}
.banner-stats {
  display: flex; gap: 16px; flex-wrap: wrap;
  margin-top: 12px;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  position: relative; z-index: 1;
}
.stat-item { display: flex; align-items: center; gap: 4px; }
.stat-item b { color: var(--accent); }

/* === Toolbar === */
.toolbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.search-wrap {
  position: relative;
  flex-shrink: 1;
  min-width: 140px;
}
.search-wrap::before {
  content: '\1F50D';
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  pointer-events: none;
  z-index: 1;
}
.search-box {
  padding: 6px 14px 6px 32px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  width: 240px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap .search-box { width: 100%; padding-left: 32px; }
.search-box:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search-box::placeholder { color: var(--text3); }
.toolbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
.toggle-row {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
}
.toggle-row input { accent-color: var(--accent); cursor: pointer; width: 14px; height: 14px; }
.toggle-row:hover { color: var(--text); }
.view-toggle { display: flex; gap: 3px; }
.view-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.view-btn:hover { background: var(--bg3); color: var(--text); }
.view-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(168,85,247,0.35);
}

/* === Content === */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px 60px;
  scroll-behavior: smooth;
}

/* === Group Headers === */
.group-header {
  width: 100%;
  background: linear-gradient(135deg, var(--bg3), var(--bg2));
  padding: 14px 20px;
  margin: 16px 0 4px 0;
  border-radius: var(--radius);
  position: sticky;
  top: 0; z-index: 10;
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: border-color 0.2s;
}
.group-header:first-child { margin-top: 0; }
.group-header:hover { border-color: var(--accent); }
.group-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}
.group-arrow {
  font-size: 10px;
  color: var(--text3);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.group-arrow.open { transform: rotate(90deg); }
.group-info { flex: 1; min-width: 0; }
.group-header h2 {
  font-size: 16px; font-weight: 600; color: #fff;
  margin: 0; border: none; padding: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.group-header .group-name-en {
  font-size: 11px; color: var(--text3); margin-top: 1px;
}
.group-header .group-stats {
  font-size: 11px; color: var(--text2); flex-shrink: 0;
  display: flex; align-items: center; gap: 8px;
}
.group-header .group-stats b { color: var(--accent); }
.group-body { display: none; padding: 2px 0; }
.group-body.open { display: block; }

/* === Passage Cards === */
.passage {
  background: var(--card);
  padding: 14px 18px;
  margin: 4px 0;
  border-radius: 8px;
  border-left: 3px solid transparent;
  transition: all 0.2s;
  position: relative;
}
.passage:hover {
  border-left-color: var(--accent);
  background: var(--card-hover);
}
.passage-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.passage-title {
  font-size: 13px; font-weight: 600;
  color: var(--accent);
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.passage .pid {
  font-size: 10px; color: var(--text3);
  font-family: 'Consolas', monospace; flex-shrink: 0;
}
.passage .tag-row { margin-bottom: 6px; display: flex; flex-wrap: wrap; gap: 3px; }
.passage .tag {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 500;
}
.tag-cond { background: rgba(167,139,250,0.12); color: var(--tag-cond); }
.tag-default { background: rgba(255,255,255,0.06); color: var(--text2); }
.passage .text {
  font-size: 14px; line-height: 1.85;
  color: var(--text);
  white-space: pre-wrap; word-break: break-word;
}
.passage .text-en {
  font-size: 12px; color: var(--text2);
  margin-top: 8px; padding-top: 8px;
  border-top: 1px dashed var(--border);
  font-style: italic; line-height: 1.6;
  white-space: pre-wrap;
  max-height: 120px; overflow: hidden;
  position: relative;
}
.passage .text-en.collapsed::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 40px;
  background: linear-gradient(transparent, var(--card));
  pointer-events: none;
}
.passage .choices-row {
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 4px;
}
.choice-btn {
  padding: 3px 10px;
  border-radius: 14px;
  background: var(--accent-glow);
  border: 1px solid rgba(168,85,247,0.25);
  color: var(--accent);
  font-size: 11px;
  cursor: default;
}

/* === States === */
.loading {
  text-align: center; padding: 80px 20px; color: var(--text2);
}
.loading .spinner {
  display: inline-block;
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text2); font-size: 14px;
}

/* === Scrollbar === */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* === Keyboard shortcut hint === */
.kb-hint {
  position: fixed; bottom: 12px; right: 16px;
  font-size: 10px; color: var(--text3);
  pointer-events: none; z-index: 100;
}
.kb-hint kbd {
  padding: 1px 4px; border-radius: 3px;
  background: var(--bg2); border: 1px solid var(--border);
  font-family: inherit;
}

/* === Mobile === */
@media (max-width: 768px) {
  .game-banner { padding: 16px; }
  .banner-text h1 { font-size: 20px; }
  .content { padding: 10px 12px 40px; }
  .passage .text { font-size: 15px; line-height: 1.9; }
  .toolbar { padding: 6px 10px; gap: 6px; }
  .search-wrap { width: 100%; }
  .search-box { width: 100%; }
  .toolbar-right { margin-left: 0; width: 100%; flex-wrap: wrap; justify-content: center; }
  .view-toggle { width: 100%; justify-content: center; }
  .group-header { padding: 10px 14px; }
  .group-header h2 { font-size: 15px; }
  .kb-hint { display: none; }
}
</style>
</head>
<body>
<div class="app">
  <div class="game-banner">
    <div class="banner-top">
      <div class="banner-icon">\u{1F451}</div>
      <div class="banner-text">
        <h1 id="gameTitle">繼承者的面紗</h1>
        <div class="subtitle" id="gameSubtitle">Veil of the Heir | 奇幻冒險 RPG</div>
      </div>
    </div>
    <div class="banner-stats" id="bannerStats"></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" class="search-box" id="searchBox" placeholder="搜尋段落、場景、內容...">
    </div>
    <div class="toolbar-right">
      <label class="toggle-row">
        <input type="checkbox" id="showZh" checked>
        <span>中文</span>
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="showEn">
        <span>英文</span>
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="showChoices" checked>
        <span>選項</span>
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="showCond">
        <span>條件</span>
      </label>
      <div class="view-toggle">
        <button class="view-btn active" data-view="narrative" id="viewNarrative">敘事</button>
        <button class="view-btn" data-view="all" id="viewAll">全部段落</button>
      </div>
    </div>
  </div>

  <div class="content" id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div>載入敘事數據中...</div>
    </div>
  </div>
</div>

<div class="kb-hint">
  <kbd>/</kbd> 搜尋 &nbsp; <kbd>1</kbd><kbd>2</kbd> 切換視圖 &nbsp; <kbd>Esc</kbd> 清除
</div>

<script>
// ============================================================
// Veil of the Heir - Enhanced Narrative Viewer
// ============================================================

var CHUNK_SIZE = 60;

var GROUP_ICONS = {
  'goblin_scrounger_info (13 passages)': ['#84cc16', '\u{1F9CC}', '哥布林商人', '製作與交易'],
  'valetia_session_1': ['#ec4899', '\u{1F48E}', 'Valetia 篇', '第一次會面'],
  'female_underwear': ['#e879f9', '\u{1F457}', '女性內衣', '衣櫥系統'],
  'female_wear_1': ['#a855f7', '\u{1F45A}', '女性服裝', '上衣/外衣'],
  'female_shoes_1': ['#f472b6', '\u{1F462}', '女性鞋履', '鞋子選擇'],
  'maera_sex_6': ['#f43f5e', '\u{1F525}', 'Maera 篇', '親密場景'],
  'north_forest_dawn (6 passages)': ['#22c55e', '\u{1F332}', '北方森林（黎明）', '黎明探索'],
  'north_forest_initial': ['#14b8a6', '\u{1F333}', '北方森林', '初始探索'],
  'marda_session_2_9 (2 passages)': ['#f59e0b', '\u{2694}', 'Marda 篇', '訓練與互動'],
  'chest_2_chest_1': ['#d97706', '\u{1F4E6}', '寶箱', '物品與裝備'],
  'hair_3_hair_4': ['#8b5cf6', '\u{1F487}', '髮型', '造型系統'],
  'left_hand_mm_left_hand_ml': ['#6366f1', '\u{270B}', '左手裝備', '武器/飾品'],
  'right_hand_ml_right_hand_mm': ['#3b82f6', '\u{1F91A}', '右手裝備', '武器/飾品'],
  'right_leg_mm_right_leg_ml': ['#0ea5e9', '\u{1F9B5}', '腿部裝備', '護甲/配件']
};

// === State ===
var DATA = null;
var searchQuery = '';
var showZh = true;
var showEn = false;
var showChoices = true;
var showCond = false;
var currentView = 'narrative';
var openSections = new Set();

// === Data Loading ===
async function loadData() {
  try {
    var resp = await fetch('data/passages.json?v=' + Date.now());
    DATA = await resp.json();
    if (!DATA.meta.has_zh) {
      document.getElementById('showZh').parentElement.style.display = 'none';
      showZh = false;
      showEn = true;
      document.getElementById('showEn').checked = true;
    }
    init();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="empty-state">載入失敗: ' + e.message + '</div>';
  }
}

// === Extract choices from [[link]] syntax ===
function extractChoices(content) {
  if (!content) return [];
  var choices = [];
  var re = /\[\[([^\]|]*?)(?:\|([^\]]*?))?\]\]/g;
  var m;
  while ((m = re.exec(content)) !== null) {
    var text = m[1].trim();
    var target = (m[2] || m[1]).trim();
    if (text && text.length < 120 && text.length > 1) {
      choices.push({ text: text, target: target });
    }
  }
  return choices;
}

// === Banner ===
function renderBanner() {
  var m = DATA.meta;
  var total = m.total || DATA.passages.length;
  var groups = (DATA.groups || []).length;
  var zhCount = m.translated_count || DATA.passages.filter(function(p) { return p.content_zh; }).length;
  var pct = total > 0 ? Math.round(zhCount / total * 100) : 0;

  document.getElementById('bannerStats').innerHTML =
    '<span class="stat-item"><b>' + groups + '</b> 分類</span>' +
    '<span class="stat-item"><b>' + total.toLocaleString() + '</b> 段落</span>' +
    '<span class="stat-item" style="color:' + (pct >= 95 ? '#4ade80' : '#fbbf24') + '">' + pct + '% 已翻譯</span>';
}

// === Filtering ===
function getFiltered() {
  var passages = DATA.passages;
  if (searchQuery) {
    var q = searchQuery.toLowerCase();
    passages = passages.filter(function(p) {
      return (p.content_zh || '').toLowerCase().includes(q) ||
        (p.content || '').toLowerCase().includes(q) ||
        (p.name || '').toLowerCase().includes(q) ||
        (p.group || '').toLowerCase().includes(q);
    });
  }
  return passages;
}

// === Passage Title ===
function getPassageTitle(p) {
  if (p.title && p.title.length > 2 && p.title.length < 80) return p.title;
  var name = p.name || '';
  if (name && !/^(g\d|passage_|p\d|#|\d+$)/.test(name) && name.length > 2 && name.length < 80) return name;
  if (p.content_zh) {
    var first = p.content_zh.replace(/<<[^>]*?>>/g, '').replace(/<[^>]*>/g, '').replace(/\[.*?\]/g, '').replace(/\/\*[\s\S]*?\*\//g, '').split(/[。！？\n]/)[0].trim();
    if (first.length > 4) return first.length > 50 ? first.substring(0, 47) + '...' : first;
  }
  if (p.content) {
    var first = p.content.replace(/<<[^>]*?>>/g, '').replace(/<[^>]*>/g, '').replace(/\/\*[\s\S]*?\*\//g, '').split(/[.!?\n]/)[0].trim();
    if (first.length > 4) return first.length > 50 ? first.substring(0, 47) + '...' : first;
  }
  return name || 'Passage ' + p.pid;
}

// === Condition Extraction ===
function extractConditions(text) {
  if (!text) return [];
  var conds = [];
  var re = /<<(?:else)?if\s+([^>]+?)>>/g;
  var m;
  while ((m = re.exec(text)) !== null) {
    conds.push(m[1].trim());
  }
  return conds;
}

// === Text Formatting ===
function formatText(s) {
  if (!s) return '';
  var text = s;
  // Strip CSS/HTML blocks
  text = text.replace(/<style[\s\S]*?<\/style>/gi, '');
  text = text.replace(/<script[\s\S]*?<\/script>/gi, '');
  text = text.replace(/<[^>]*>/g, ' ');
  // Strip Twine macros
  text = text.replace(/<<[^>]*?>>/g, '');
  // Strip [[link|target]]
  text = text.replace(/\[\[([^\]|]*?)(?:\|[^\]]*?)?\]\]/g, '');
  // Strip comments and CSS
  text = text.replace(/\/\*[\s\S]*?\*\//g, '');
  text = text.replace(/\{[^}]*\}/g, '');
  // Strip :: headers and [IF]/[/IF]
  text = text.replace(/^::\s+.*$/gm, '');
  text = text.replace(/\[(?:IF|\/IF|ELSE)\b[^\]]*\]/gi, '');
  // Clean whitespace
  text = text.replace(/\n{3,}/g, '\n\n').replace(/[ \t]+/g, ' ').trim();
  var html = escHtml(text);
  html = html.replace(/\n\n+/g, '</p><p>').replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// === Passage HTML ===
function passageHtml(p) {
  var title = getPassageTitle(p);
  var pid = p.pid != null ? '<span class="pid">#' + escHtml(String(p.pid)) + '</span>' : '';

  var tags = '';
  if (p.tags && p.tags.length > 0) {
    var uniqueTags = p.tags.filter(function(t) { return t !== p.group; });
    if (uniqueTags.length > 0) {
      tags = '<div class="tag-row">' + uniqueTags.map(function(t) {
        return '<span class="tag tag-default">' + escHtml(t) + '</span>';
      }).join('') + '</div>';
    }
  }

  var condHtml = '';
  if (showCond) {
    var conds = extractConditions(p.content || '');
    if (conds.length > 0) {
      condHtml = '<div class="tag-row">' + conds.slice(0, 5).map(function(c) {
        return '<span class="tag tag-cond" title="' + escHtml(c) + '">' + escHtml(c.length > 30 ? c.substring(0, 27) + '...' : c) + '</span>';
      }).join('') + '</div>';
    }
  }

  var TEXT_LIMIT = 5000;
  var textHtml = '';
  if (showZh && p.content_zh) {
    var t = p.content_zh.length > TEXT_LIMIT ? p.content_zh.substring(0, TEXT_LIMIT) : p.content_zh;
    var trunc = p.content_zh.length > TEXT_LIMIT ? '<div style="color:var(--tag-cond);font-size:11px;margin-top:4px">... 已截斷 (' + (p.content_zh.length/1000).toFixed(0) + 'K)</div>' : '';
    textHtml += '<div class="text">' + formatText(t) + '</div>' + trunc;
  }
  if (showEn && p.content) {
    var t = p.content.length > TEXT_LIMIT ? p.content.substring(0, TEXT_LIMIT) : p.content;
    var trunc = p.content.length > TEXT_LIMIT ? '<div style="color:var(--tag-cond);font-size:11px;margin-top:4px">... truncated (' + (p.content.length/1000).toFixed(0) + 'K)</div>' : '';
    if (showZh && p.content_zh) {
      var isLong = t.length > 300;
      textHtml += '<div class="text-en' + (isLong ? ' collapsed' : '') + '">' + formatText(t) + '</div>' + trunc;
    } else {
      textHtml += '<div class="text">' + formatText(t) + '</div>' + trunc;
    }
  }
  if (!textHtml) {
    textHtml = p.content_zh
      ? '<div class="text">' + formatText(p.content_zh.length > TEXT_LIMIT ? p.content_zh.substring(0, TEXT_LIMIT) : p.content_zh) + '</div>'
      : p.content
        ? '<div class="text">' + formatText(p.content.length > TEXT_LIMIT ? p.content.substring(0, TEXT_LIMIT) : p.content) + '</div>'
        : '<div class="text" style="color:var(--text3)">(empty)</div>';
  }

  var choices = extractChoices(p.content || '');
  var choicesHtml = '';
  if (showChoices && choices.length > 0) {
    var shown = choices.slice(0, 20);
    var overflow = choices.length > 20 ? '<span style="font-size:11px;color:var(--text2)">+' + (choices.length - 20) + ' 更多</span>' : '';
    choicesHtml = '<div class="choices-row">' + shown.map(function(c) {
      return '<span class="choice-btn" title="-> ' + escHtml(c.target) + '">' + escHtml(c.text) + '</span>';
    }).join('') + overflow + '</div>';
  }

  return '<div class="passage">' +
    '<div class="passage-header">' +
      '<span class="passage-title">' + escHtml(title) + '</span>' +
      pid +
    '</div>' +
    tags + condHtml + textHtml + choicesHtml +
  '</div>';
}

// === Chunked Rendering ===
function renderChunked(container, passages, startIdx) {
  var end = Math.min(startIdx + CHUNK_SIZE, passages.length);
  var html = '';
  for (var i = startIdx; i < end; i++) {
    html += passageHtml(passages[i]);
  }
  container.insertAdjacentHTML('beforeend', html);

  if (end < passages.length) {
    var sentinel = document.createElement('div');
    sentinel.className = 'loading';
    sentinel.style.padding = '16px';
    sentinel.innerHTML = '<div style="font-size:11px;color:var(--text3)">載入更多 (' + end + '/' + passages.length + ')...</div>';
    container.appendChild(sentinel);

    var obs = new IntersectionObserver(function(entries) {
      if (entries[0].isIntersecting) {
        obs.disconnect();
        sentinel.remove();
        renderChunked(container, passages, end);
      }
    });
    obs.observe(sentinel);
  }
}

// === Narrative View ===
function renderNarrativeView(passages) {
  var content = document.getElementById('content');
  content.innerHTML = '';
  var groups = groupPassages(passages);

  if (groups.length === 0) {
    content.innerHTML = '<div class="empty-state">未找到匹配的段落</div>';
    return;
  }

  groups.forEach(function(entry) {
    var gName = entry[0], gPassages = entry[1];
    var isOpen = openSections.has('g:' + gName);
    var iconInfo = GROUP_ICONS[gName] || ['#64748b', gName.substring(0, 2).toUpperCase(), gName, ''];

    var header = document.createElement('div');
    header.className = 'group-header';
    header.innerHTML =
      '<div class="group-icon" style="background:' + iconInfo[0] + '22;color:' + iconInfo[0] + '">' + iconInfo[1] + '</div>' +
      '<span class="group-arrow' + (isOpen ? ' open' : '') + '">&#9654;</span>' +
      '<div class="group-info">' +
        '<h2>' + escHtml(iconInfo[2]) + '</h2>' +
        '<div class="group-name-en">' + escHtml(iconInfo[3] || gName) + '</div>' +
      '</div>' +
      '<div class="group-stats">' +
        '<span><b>' + gPassages.length + '</b> 段落</span>' +
      '</div>';

    var body = document.createElement('div');
    body.className = 'group-body' + (isOpen ? ' open' : '');

    header.addEventListener('click', function() {
      var nowOpen = body.classList.toggle('open');
      header.querySelector('.group-arrow').classList.toggle('open', nowOpen);
      if (nowOpen) {
        openSections.add('g:' + gName);
        if (!body.dataset.rendered) {
          renderChunked(body, gPassages, 0);
          body.dataset.rendered = '1';
        }
      } else {
        openSections.delete('g:' + gName);
      }
    });

    if (isOpen && !body.dataset.rendered) {
      renderChunked(body, gPassages, 0);
      body.dataset.rendered = '1';
    }

    content.appendChild(header);
    content.appendChild(body);
  });
}

function groupPassages(passages) {
  var groups = new Map();
  passages.forEach(function(p) {
    var g = p.group || '(uncategorized)';
    if (!groups.has(g)) groups.set(g, []);
    groups.get(g).push(p);
  });
  if (DATA.groups && DATA.groups.length > 0) {
    var ordered = [];
    var seen = new Set();
    DATA.groups.forEach(function(gi) {
      var key = gi.id || gi.name;
      if (groups.has(key)) { ordered.push([key, groups.get(key)]); seen.add(key); }
    });
    groups.forEach(function(v, k) { if (!seen.has(k)) ordered.push([k, v]); });
    return ordered;
  }
  return Array.from(groups.entries()).sort(function(a, b) { return b[1].length - a[1].length; });
}

// === All View ===
function renderAllView(passages) {
  var content = document.getElementById('content');
  content.innerHTML = '';
  if (passages.length === 0) {
    content.innerHTML = '<div class="empty-state">未找到匹配的段落</div>';
    return;
  }
  renderChunked(content, passages, 0);
}

// === Render Dispatch ===
function resetAndRender() {
  var passages = getFiltered();
  switch (currentView) {
    case 'narrative': renderNarrativeView(passages); break;
    case 'all': renderAllView(passages); break;
  }
}

function setActiveView(view) {
  currentView = view;
  openSections.clear();
  document.querySelectorAll('.view-btn').forEach(function(b) { b.classList.remove('active'); });
  var btnId = view === 'narrative' ? 'viewNarrative' : 'viewAll';
  document.getElementById(btnId).classList.add('active');
  resetAndRender();
}

// === Init ===
function init() {
  renderBanner();

  var searchTimeout;
  document.getElementById('searchBox').addEventListener('input', function(e) {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(function() {
      searchQuery = e.target.value.trim();
      openSections.clear();
      resetAndRender();
    }, 300);
  });

  document.getElementById('showZh').addEventListener('change', function(e) { showZh = e.target.checked; openSections.clear(); resetAndRender(); });
  document.getElementById('showEn').addEventListener('change', function(e) { showEn = e.target.checked; openSections.clear(); resetAndRender(); });
  document.getElementById('showChoices').addEventListener('change', function(e) { showChoices = e.target.checked; openSections.clear(); resetAndRender(); });
  document.getElementById('showCond').addEventListener('change', function(e) { showCond = e.target.checked; openSections.clear(); resetAndRender(); });

  document.getElementById('viewNarrative').addEventListener('click', function() { setActiveView('narrative'); });
  document.getElementById('viewAll').addEventListener('click', function() { setActiveView('all'); });

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === '/') { e.preventDefault(); document.getElementById('searchBox').focus(); }
    if (e.key === '1') setActiveView('narrative');
    if (e.key === '2') setActiveView('all');
    if (e.key === 'Escape') {
      document.getElementById('searchBox').blur();
      searchQuery = '';
      document.getElementById('searchBox').value = '';
      openSections.clear();
      resetAndRender();
    }
  });

  resetAndRender();
}

loadData();
</script>
